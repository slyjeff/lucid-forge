name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: lucidforge-windows-amd64.zip
            build_flags: ""
          - os: macos-latest
            platform: darwin/universal
            artifact: lucidforge-macos-universal.zip
            build_flags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: lucidforge-linux-amd64.AppImage
            build_flags: "-tags webkit2_41"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev file

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: app/frontend
        run: npx vitest run --passWithNoTests

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build

      - name: Run Go tests
        working-directory: app
        run: go test ./...

      - name: Build Wails app
        working-directory: app
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build_flags }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: app/build/bin
        run: Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/${{ matrix.artifact }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: app/build/bin
        run: zip -r ${{ github.workspace }}/${{ matrix.artifact }} .

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y imagemagick
          convert app/frontend/src/assets/lucidforge-logo.png -resize 256x256 lucidforge.png
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          DEPLOY_GTK_VERSION=3 APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable app/build/bin/lucidforge \
            --desktop-file app/linux/lucidforge.desktop \
            --icon-file lucidforge.png \
            --plugin gtk \
            --output appimage
          mv LucidForge-x86_64.AppImage ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
